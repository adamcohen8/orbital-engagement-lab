# Canonical simulation scenario config template
# "Everything On" baseline template

scenario_name: "everything_on_template"

metadata:
  owner: "team"
  notes: "Full-feature baseline with rocket + target + chaser, broad dynamics, mission hooks, plots, and animations enabled."

rocket:
  enabled: true
  role: "rocket"
  preset: "../sim/presets/objects/basic_two_stage_rocket.yaml"
  specs:
    payload_mass_kg: 150.0
    thrust_axis_body: [1.0, 0.0, 0.0]
  initial_state:
    launch_lat_deg: 28.5
    launch_lon_deg: -80.6
    launch_alt_km: 0.0
    launch_azimuth_deg: 90.0
  base_guidance:
    kind: "python"
    module: "sim.rocket.guidance"
    class_name: "OpenLoopPitchProgramGuidance"
    params:
      vertical_hold_s: 8.0
      pitch_start_s: 8.0
      pitch_end_s: 190.0
      pitch_final_deg: 75.0
      max_throttle: 1.0
  guidance_modifiers: []
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_strategy:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "RocketPursuitMissionStrategy"
    params:
      target_id: "target"
  mission_execution:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "RocketGoNowExecution"
    params: {}
  mission_objectives: []
  bridge:
    enabled: false
    mode: "sil"
    endpoint: "udp://127.0.0.1:50100"
    module: "integrations.cfs_sil.python_bridge"
    class_name: "CFSBridge"
    params: {}
  knowledge:
    refresh_rate_s: 1.0
    targets:
      - "target"
    conditions:
      require_line_of_sight: true
      max_range_km: 50000.0
    sensor_error:
      pos_sigma_km: [0.01, 0.01, 0.01]
      vel_sigma_km_s: [0.0001, 0.0001, 0.0001]
    estimation:
      type: "ekf"

chaser:
  enabled: true
  role: "chaser"
  preset: "../sim/presets/objects/basic_satellite.yaml"
  specs:
    mass_kg: 200.0
  initial_state:
    source: "rocket_deployment"
    deploy_time_s: 900.0
    deploy_dv_body_m_s: [10.0, 0.0, 0.0]
    # Optional alternative: initialize chaser relative to target in RIC instead of deployment/absolute state.
    # relative_to_target_ric:
    #   frame: "rect"   # "rect" | "curv"
    #   state: [2.0, -8.0, 1.2, 0.0008, -0.0012, 0.0004]  # [R,I,C,dR,dI,dC] (km, km/s)
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.0, 0.0, 0.0]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.lqr"
    class_name: "HCWLQRController"
    params:
      mean_motion_rad_s: 0.001078
      max_accel_km_s2: 2.0e-6
      design_dt_s: 10.0
      ric_curv_state_slice: [0, 6]
      chief_eci_state_slice: [6, 12]
      # Optional no-radial-burn variant:
      # module: "sim.control.orbit.lqr_no_radial"
      # class_name: "HCWNoRadialLQRController"
      # params:
      #   mean_motion_rad_s: 0.001078
      #   max_accel_km_s2: 2.0e-6
      #   design_dt_s: 10.0
      #   ric_curv_state_slice: [0, 6]
      #   chief_eci_state_slice: [6, 12]
      #   r_weights: [1.94e13, 1.94e13]
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.surrogate_snap"
    class_name: "SurrogateSnapECIController"
    params:
      desired_attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
      cancel_rate_mag_rad_s2: 1.0
      rate_tolerance_rad_s: 1.0e-3
      slew_time_180_s: 1.0
      pointing_sigma_deg: 0.05
      default_dt_s: 1.0
      rng_seed: 2
  mission_strategy:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "PursuitMissionStrategy"
    params:
      target_id: "target"
      use_knowledge_for_targeting: true
      max_accel_km_s2: 2.0e-6
      align_to_thrust: true
  mission_execution:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "ControllerPointingExecution"
    params:
      thruster_direction_body: [1.0, 0.0, 0.0]
      alignment_tolerance_deg: 10.0
      require_attitude_alignment: true
  mission_objectives: []
  bridge:
    enabled: false
    mode: "hil"
    endpoint: "udp://127.0.0.1:51100"
    module: "integrations.hil.bridge"
    class_name: "HILBridge"
    params: {}
  knowledge:
    refresh_rate_s: 1.0
    targets:
      - "target"
    conditions:
      require_line_of_sight: true
      max_range_km: 10000.0
    sensor_error:
      pos_sigma_km: [0.005, 0.005, 0.005]
      vel_sigma_km_s: [0.00005, 0.00005, 0.00005]
    estimation:
      type: "ekf"

target:
  enabled: true
  role: "target"
  preset: "../sim/presets/objects/basic_satellite.yaml"
  reference_orbit:
    enabled: false
  specs:
    mass_kg: 400.0
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.001
      inc_deg: 45.0
      raan_deg: 0.0
      argp_deg: 0.0
      true_anomaly_deg: 0.0
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.0, 0.0, 0.0]
    # When target.reference_orbit.enabled is true, a passive reference orbit is propagated
    # from this same initial position/velocity for RIC-frame plotting.
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.surrogate_snap"
    class_name: "SurrogateSnapECIController"
    params:
      desired_attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
      cancel_rate_mag_rad_s2: 1.0
      rate_tolerance_rad_s: 1.0e-3
      slew_time_180_s: 1.0
      pointing_sigma_deg: 0.05
      default_dt_s: 1.0
      rng_seed: 3
  mission_strategy:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "HoldMissionStrategy"
    params:
      attitude_mode: "hold_eci"
      hold_quat_bn: [1.0, 0.0, 0.0, 0.0]
  mission_execution:
    kind: "python"
    module: "sim.mission.modules"
    class_name: "ControllerPointingExecution"
    params:
      thruster_direction_body: [1.0, 0.0, 0.0]
      alignment_tolerance_deg: 10.0
      require_attitude_alignment: false
  mission_objectives: []
  bridge:
    enabled: false
    mode: "sil"
    endpoint: null
    module: null
    class_name: null
    params: {}
  knowledge:
    refresh_rate_s: 1.0
    targets:
      - "rocket"
      - "chaser"
    conditions:
      require_line_of_sight: true
      max_range_km: 50000.0
    sensor_error:
      pos_sigma_km: [0.02, 0.02, 0.02]
      vel_sigma_km_s: [0.0002, 0.0002, 0.0002]
    estimation:
      type: "ekf"

simulator:
  scenario_type: "auto"
  # Timing grid rules:
  # - duration_s must be an integer multiple of dt_s.
  # - optional orbit/attitude substeps must be positive, <= dt_s, and divide dt_s.
  # - run `python run_simulation.py --config <path> --validate-only` before long runs.
  duration_s: 7200.0
  dt_s: 1.0
  initial_jd_utc: null
  dynamics:
    orbit:
      model: "two_body"
      orbit_substep_s: null   # optional; smaller substep for orbit integration; must divide dt_s
      j2: false
      j3: false
      j4: false
      drag: true
      srp: true
      spherical_harmonics:
        enabled: true
        degree: 8
        order: 8
    attitude:
      enabled: true
      attitude_substep_s: null   # optional; smaller substep for attitude integration; must divide dt_s
      disturbance_torques:
        gravity_gradient: true
        magnetic: true
        drag: true
        srp: true
    rocket:
      enabled: true
      atmosphere_model: "ussa1976"
      attitude_mode: "dynamic"  # dynamic | cheater
      target_altitude_km: 500.0
      target_altitude_tolerance_km: 25.0
      target_eccentricity_max: 0.02
      insertion_hold_time_s: 30.0
      aero_model_enabled: true
      use_stagewise_aero_geometry: true
      area_ref_m2: null
      cd: 0.35
      cr: 1.2
      max_q_limiter_enabled: true
      max_q_pa: 45000.0
      min_throttle: 0.0
      orbit_insertion_cutoff_enabled: false
      cutoff_min_alt_km: 90.0
      cutoff_min_periapsis_alt_km: 140.0
      cutoff_apoapsis_margin_km: 10.0
      cutoff_energy_margin_km2_s2: 0.01
      cutoff_ecc_relax_factor: 3.0
      cutoff_hard_escape_enabled: true
      cutoff_near_escape_speed_margin_frac: 0.03
      aero:
        reference_area_m2: 10.0
        reference_length_m: 30.0
        cp_offset_body_m: [0.0, 0.0, 0.0]
        cd_base: 0.20
        cd_alpha2: 0.10
        cd_supersonic: 0.28
        transonic_peak_cd: 0.22
        transonic_mach: 1.0
        transonic_width: 0.22
        cl_alpha_per_rad: 0.15
        cy_beta_per_rad: 0.15
        cm_alpha_per_rad: -0.02
        cn_beta_per_rad: -0.02
        cl_roll_per_rad: -0.01
        alpha_limit_deg: 20.0
        beta_limit_deg: 20.0
  environment:
    ephemeris_mode: "analytic_simple"
    use_spice: false
    atmosphere_env: {}
  plugin_validation:
    strict: true
  termination:
    earth_impact_enabled: true
    earth_radius_km: 6378.137

outputs:
  output_dir: "outputs/everything_on_template"
  mode: "both"  # interactive | save | both
  stats:
    enabled: true
    print_summary: true
    save_json: true
    save_csv: false
    save_full_log: true
  plots:
    enabled: true
    reference_object_id: "target"
    figure_ids:
      - "orbit_eci"
      - "trajectory_eci_multi"
      - "trajectory_ecef_multi"
      - "trajectory_ric_rect_multi"
      - "trajectory_ric_curv_multi"
      - "trajectory_ecef"
      - "trajectory_ric_rect"
      - "trajectory_ric_curv"
      - "attitude"
      - "quaternion_eci"
      - "quaternion_ric"
      - "rates_eci"
      - "rates_ric"
      - "relative_range"
      - "knowledge_timeline"
      - "control_thrust"
      - "control_thrust_multi"
    dpi: 160
  animations:
    enabled: true
    types:
      - "ground_track_multi"
      - "ground_track"
      # - "attitude_ric_thruster"
      # - "battlespace_dashboard"
      # - "target_reference_ric_curv_3d"
      # - "target_reference_ric_curv_2d"
      # - "target_reference_ric_curv_2d_ri"
      # - "target_reference_ric_curv_2d_ic"
      # - "target_reference_ric_curv_2d_rc"
    # attitude_ric_thruster_object_ids: ["target", "chaser"]
    # attitude_ric_thruster_dims_m:
    #   target: [1.0, 1.0, 1.0]
    #   chaser: [1.0, 1.0, 1.0]
    # attitude_ric_thruster_active_threshold_km_s2: 1.0e-15
    # battlespace_dashboard_target_object_id: "target"
    # battlespace_dashboard_chaser_object_id: "chaser"
    # battlespace_dashboard_show_trajectory: true
    # battlespace_dashboard_attitude_dims_m:
    #   target: [1.0, 1.0, 1.0]
    #   chaser: [1.0, 1.0, 1.0]
    # battlespace_dashboard_thruster_active_threshold_km_s2: 1.0e-15
    # target_reference_ric_curv_object_ids: ["target", "chaser"]
    # target_reference_ric_curv_3d_show_trajectory: true
    # target_reference_ric_curv_2d_show_trajectory: true
    # target_reference_ric_curv_2d_planes: ["ri", "ic", "rc"]
    # target_reference_ric_curv_2d_ri_show_trajectory: true
    # target_reference_ric_curv_2d_ic_show_trajectory: true
    # target_reference_ric_curv_2d_rc_show_trajectory: true
    fps: 30
    speed_multiple: 5.0
    frame_stride: 2
    draw_earth_map: true
  monte_carlo:
    save_iteration_summaries: true
    save_aggregate_summary: true
    save_histograms: true
    save_ops_dashboard: true
    save_raw_runs: false
    baseline_summary_json: ""
    success_termination_reasons: ["rocket_orbit_insertion"]
    catastrophic_failure_reasons: ["terminated_early:earth_impact"]
    require_rocket_insertion: false
    gates:
      min_closest_approach_km: 0.25
      max_duration_s: 5400.0
      max_total_dv_m_s: 250.0
      max_guardrail_events: 10

monte_carlo:
  # Use YAML booleans (true/false), not quoted strings ("false").
  # Generated MC configs are validated before workers launch; if varying simulator.dt_s,
  # every sampled value must preserve duration_s/dt_s and substep/dt_s integer ratios.
  enabled: false
  iterations: 100
  base_seed: 1000
  parallel_enabled: false
  parallel_workers: 0
  variations:
    - parameter_path: "rocket.initial_state.launch_azimuth_deg"
      mode: "normal"
      mean: 90.0
      std: 0.5
    - parameter_path: "simulator.environment.atmosphere_env.solar_flux_f107"
      mode: "choice"
      options: [90.0, 120.0, 150.0, 180.0]
    - parameter_path: "chaser.initial_state.deploy_dv_body_m_s[0]"
      mode: "uniform"
      low: 5.0
      high: 15.0
