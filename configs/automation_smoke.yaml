scenario_name: "automation_smoke"

metadata:
  owner: "ci"
  notes: "Headless-friendly smoke config for automation and CI."

rocket:
  enabled: false
  role: "rocket"

chaser:
  enabled: false
  role: "chaser"

target:
  enabled: true
  role: "target"
  specs:
    mass_kg: 300.0
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.0
      inc_deg: 45.0
      raan_deg: 0.0
      argp_deg: 0.0
      true_anomaly_deg: 0.0
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.0, 0.0, 0.0]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_objectives: []

simulator:
  scenario_type: "auto"
  duration_s: 120.0
  dt_s: 1.0
  dynamics:
    orbit:
      model: "two_body"
      orbit_substep_s: 1.0
      j2: false
      j3: false
      j4: false
      drag: false
      srp: false
    attitude:
      enabled: true
      attitude_substep_s: 0.1
      disturbance_torques:
        gravity_gradient: false
        magnetic: false
        drag: false
        srp: false
    rocket:
      enabled: false
  environment:
    ephemeris_mode: "analytic_simple"
    atmosphere_env: {}
  plugin_validation:
    strict: true
  termination:
    earth_impact_enabled: true
    earth_radius_km: 6378.137

outputs:
  output_dir: "outputs/automation_smoke"
  mode: "save"
  stats:
    enabled: true
    print_summary: false
    save_json: true
    save_csv: false
    save_full_log: false
  plots:
    enabled: false
    figure_ids: []
  animations:
    enabled: false
    types: []
