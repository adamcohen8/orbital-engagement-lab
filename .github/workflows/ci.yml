name: CI

on:
  push:
  pull_request:

jobs:
  public-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install ".[dev]"

      - name: Run focused tests
        run: |
          python -m pytest -q \
            sim/tests/test_scenario_yaml_config.py \
            sim/tests/test_app_io.py \
            sim/tests/test_api.py \
            sim/tests/test_master_simulator.py

      - name: Validate smoke scenario
        run: python run_simulation.py --config configs/automation_smoke.yaml --validate-only
