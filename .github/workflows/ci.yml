name: CI

on:
  push:
  pull_request:

jobs:
  public-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install ".[dev]"

      - name: Run public tests
        run: python -m pytest -q sim/tests

      - name: Validate smoke scenario
        run: python run_simulation.py --config configs/automation_smoke.yaml --validate-only

      - name: Run curated public examples headlessly
        env:
          MPLCONFIGDIR: ${{ runner.temp }}/matplotlib
        run: |
          mkdir -p "$MPLCONFIGDIR"
          python examples/Simulation_Config_Load_Demo.py
          python examples/Orbit_HCW_LQR_Demo.py --plot-mode save --duration 120
          python examples/Attitude_PD_ReactionWheel_Demo.py --plot-mode save --duration 20 --attitude-dt 0.1
          python examples/Rendezvous_HCW_AttitudeLQR_Demo.py --plot-mode save --duration 20 --dt 2
          python examples/Object_Knowledge_EKF_Demo.py --plot-mode save
