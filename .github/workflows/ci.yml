name: CI

on:
  push:
  pull_request:

jobs:
  public-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install ".[dev]"

      - name: Run public tests
        run: python -m pytest -q sim/tests

      - name: Check quickstart readiness
        run: python run_simulation.py --doctor

      - name: Validate five-minute quickstart scenario
        run: python run_simulation.py --quickstart --validate-only

      - name: Validate curated public example configs
        run: |
          python run_simulation.py --config examples/configs/public_rendezvous_closed_loop.yaml --validate-only
          python run_simulation.py --config examples/configs/public_orbit_environment_stack.yaml --validate-only
          python run_simulation.py --config examples/configs/public_manual_engagement.yaml --validate-only

      - name: Run five-minute quickstart scenario headlessly
        run: python run_simulation.py --quickstart

      - name: Check quickstart start-here artifacts
        run: |
          test -f outputs/quickstart_5min/index.md
          test -f outputs/quickstart_5min/master_run_summary.json
