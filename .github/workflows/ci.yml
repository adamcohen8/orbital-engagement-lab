name: CI

on:
  push:
  pull_request:

jobs:
  public-core:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install -U pip
          python -m pip install ".[dev]"

      - name: Run public tests
        run: python -m pytest -q sim/tests

      - name: Validate smoke scenario
        run: python run_simulation.py --config configs/automation_smoke.yaml --validate-only

      - name: Validate curated public example configs
        run: |
          python run_simulation.py --config examples/configs/automation_smoke.yaml --validate-only
          python run_simulation.py --config examples/configs/plotting_rendezvous_demo.yaml --validate-only
          python run_simulation.py --config examples/configs/hcw_lqr_two_body_perfect.yaml --validate-only
          python run_simulation.py --config examples/configs/game_mode_basic.yaml --validate-only
          python run_simulation.py --config examples/configs/simulation_template.yaml --validate-only

      - name: Run representative public example config headlessly
        run: python run_simulation.py --config examples/configs/automation_smoke.yaml
