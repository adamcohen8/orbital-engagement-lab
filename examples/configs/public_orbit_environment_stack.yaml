scenario_name: "public_orbit_environment_stack"
scenario_description: "Public example: deterministic high-fidelity orbit/environment propagation with perturbations, attitude dynamics, knowledge, and plot outputs."

metadata:
  owner: "public"
  notes: "Shows J2/J3/J4, drag, SRP, Sun/Moon third-body perturbations, analytic ephemerides, and EKF-backed object knowledge."

rocket:
  enabled: false
  role: "rocket"

chaser:
  enabled: true
  role: "chaser"
  specs:
    preset_satellite: "BASIC_SATELLITE"
    dry_mass_kg: 170.0
    fuel_mass_kg: 20.0
    thruster: "BASIC_CHEMICAL_Z_BOTTOM"
    attitude_system: "BASIC_REACTION_WHEELS_3AXIS"
  initial_state:
    relative_to_target_ric:
      frame: "curv"
      state: [0.0, -5.0, 0.25, 0.0, 0.0, 0.0]
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.04, -0.03, 0.02]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_objectives: []
  knowledge:
    refresh_rate_s: 2.0
    targets: ["target"]
    conditions:
      require_line_of_sight: true
      max_range_km: 10000.0
    sensor_error:
      pos_sigma_km: [0.005, 0.005, 0.005]
      vel_sigma_km_s: [0.00005, 0.00005, 0.00005]
    estimation:
      type: "ekf"

target:
  enabled: true
  role: "target"
  specs:
    preset_satellite: "BASIC_SATELLITE"
    dry_mass_kg: 360.0
    fuel_mass_kg: 0.0
    attitude_system: "BASIC_REACTION_WHEELS_3AXIS"
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.001
      inc_deg: 51.6
      raan_deg: 20.0
      argp_deg: 5.0
      true_anomaly_deg: 0.0
    attitude_quat_bn: [1.0, 0.0, 0.0, 0.0]
    angular_rate_body_rad_s: [0.0, 0.0, 0.0]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  attitude_control:
    kind: "python"
    module: "sim.control.attitude.zero_torque"
    class_name: "ZeroTorqueController"
    params: {}
  mission_objectives: []
  knowledge:
    refresh_rate_s: 5.0
    targets: ["chaser"]
    conditions:
      require_line_of_sight: true
      max_range_km: 50000.0
    sensor_error:
      pos_sigma_km: [0.02, 0.02, 0.02]
      vel_sigma_km_s: [0.0002, 0.0002, 0.0002]
    estimation:
      type: "ekf"

simulator:
  scenario_type: "auto"
  duration_s: 900.0
  dt_s: 5.0
  initial_jd_utc: 2460400.5
  dynamics:
    orbit:
      model: "two_body"
      orbit_substep_s: 1.0
      j2: true
      j3: true
      j4: true
      drag: true
      srp: true
      third_body_sun: true
      third_body_moon: true
      spherical_harmonics:
        enabled: false
    attitude:
      enabled: true
      attitude_substep_s: 0.1
      disturbance_torques:
        gravity_gradient: false
        magnetic: false
        drag: false
        srp: false
    rocket:
      enabled: false
  environment:
    ephemeris_mode: "analytic_enhanced"
    atmosphere_model: "ussa1976"
    atmosphere_env:
      f107: 150.0
      f107a: 150.0
      ap: 15.0
  plugin_validation:
    strict: true
  termination:
    earth_impact_enabled: false

outputs:
  output_dir: "outputs/examples/public_orbit_environment_stack"
  mode: "save"
  stats:
    enabled: true
    print_summary: true
    save_json: true
    save_csv: false
    save_full_log: true
  plots:
    enabled: true
    preset: ["rendezvous", "estimation"]
    reference_object_id: "target"
    figure_ids:
      - "ground_track_multi"
    dpi: 140
  animations:
    enabled: false
    types: []

monte_carlo:
  enabled: false
  iterations: 1
  base_seed: 3300
  variations: []
