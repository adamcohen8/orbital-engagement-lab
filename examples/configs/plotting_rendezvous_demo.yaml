scenario_name: "plotting_rendezvous_demo"
scenario_description: "Short public demo that generates rendezvous, control, sensor, and estimation plots."

metadata:
  owner: "public"
  notes: "Fast deterministic plotting demo for README and docs gallery artifacts."

rocket:
  enabled: false
  role: "rocket"

chaser:
  enabled: true
  role: "chaser"
  preset: "basic_satellite"
  specs:
    dry_mass_kg: 180.0
    fuel_mass_kg: 20.0
  initial_state:
    relative_to_target_ric:
      frame: "curv"
      state: [0.0, -3.0, 0.2, 0.0, 0.0002, 0.0]
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.lqr"
    class_name: "HCWLQRController"
    params:
      mean_motion_rad_s: 0.001078
      max_accel_km_s2: 2.0e-5
      design_dt_s: 1.0
      ric_curv_state_slice: [0, 6]
      chief_eci_state_slice: [6, 12]
  knowledge:
    refresh_rate_s: 5.0
    targets: ["target"]
    conditions:
      require_line_of_sight: false
      max_range_km: 10000.0
      dropout_prob: 0.05
    sensor_error:
      pos_sigma_km: [0.005, 0.005, 0.005]
      vel_sigma_km_s: [0.00005, 0.00005, 0.00005]
    estimation:
      type: "ekf"

target:
  enabled: true
  role: "target"
  preset: "basic_satellite"
  specs:
    dry_mass_kg: 360.0
    fuel_mass_kg: 0.0
  initial_state:
    coes:
      a_km: 7000.0
      ecc: 0.0
      inc_deg: 45.0
      raan_deg: 0.0
      argp_deg: 0.0
      true_anomaly_deg: 0.0
  orbit_control:
    kind: "python"
    module: "sim.control.orbit.zero_controller"
    class_name: "ZeroController"
    params: {}
  knowledge:
    refresh_rate_s: 10.0
    targets: ["chaser"]
    conditions:
      require_line_of_sight: false
      max_range_km: 10000.0
    sensor_error:
      pos_sigma_km: [0.01, 0.01, 0.01]
      vel_sigma_km_s: [0.0001, 0.0001, 0.0001]
    estimation:
      type: "ekf"

simulator:
  scenario_type: "auto"
  duration_s: 300.0
  dt_s: 1.0
  dynamics:
    orbit:
      model: "two_body"
      orbit_substep_s: 1.0
      j2: false
      j3: false
      j4: false
      drag: false
      srp: false
      third_body_sun: false
      third_body_moon: false
    attitude:
      enabled: false
    rocket:
      enabled: false
  environment:
    ephemeris_mode: "analytic_simple"
    atmosphere_env: {}
  plugin_validation:
    strict: true
  termination:
    earth_impact_enabled: false

outputs:
  output_dir: "outputs/plotting_rendezvous_demo"
  mode: "save"
  stats:
    enabled: true
    print_summary: true
    save_json: true
    save_csv: false
    save_full_log: true
  plots:
    enabled: true
    preset: ["rendezvous", "estimation"]
    reference_object_id: "target"
    figure_ids:
      - "ground_track_multi"
    dpi: 140
  animations:
    enabled: false
    types: []

monte_carlo:
  enabled: false
  iterations: 1
  base_seed: 123
  variations: []
